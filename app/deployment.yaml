apiVersion: apps/v1
kind: Deployment
metadata:
  name: testnodeci
  namespace: boat

spec:
  replicas: 1

  selector:
    matchLabels:
      app: testnodeci

  template:
    metadata:
      labels:
        app: testnodeci

    spec:
      imagePullSecrets:
      - name: ghcr-secret

      containers:
      - name: testnodeci

        image: ghcr.io/c112233c/testnodeci:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 3000